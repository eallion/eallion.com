<hr class="border-t border-gray-200 dark:border-border-dimmed-subtle my-8 md:my-14">

{{- /* ========================================
    Mastodon Comment Section (preserved)
    ======================================== */ -}}

<div id="comment-mastodon" class="border border-gray-200 dark:border-border-dimmed-primary p-8 bg-zinc-100 dark:bg-bg-dimmed-secondary rounded-2xl my-8 md:my-14">

	<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mt-4 mb-4 text-base capitalize print:hidden">
		<div class="flex flex-col md:flex-row md:items-center gap-4">
			<h2 class="text-xl font-semibold">Fediverse</h2>
			<div id="load-mastodon-statuses" class="inline-flex items-center relative border border-gray-300 dark:border-border-dimmed-subtle bg-white dark:bg-bg-dimmed-primary rounded-full px-4 py-2 hover:bg-zinc-100 dark:hover:bg-bg-dimmed-secondary cursor-pointer">
			<span>加载</span>
			<span>此文的</span>
			<span class="ml-2 mr-1"><span class="relative block icon"><svg xmlns="http://www.w3.org/2000/svg" width="742.753" height="742.753" viewBox="0 0 196.52 196.52"><path fill="#a730b8" d="M47.924 72.797a18.23 18.23 0 0 1-7.796 7.76l42.799 42.965 10.318-5.23zm56.453 56.67-10.319 5.23 21.686 21.77a18.23 18.23 0 0 1 7.798-7.76z"/><path fill="#5496be" d="m129.665 102.077 1.786 11.427 27.415-13.895a18.23 18.23 0 0 1-4.972-9.812zm-14.066 7.128-57.29 29.034a18.23 18.23 0 0 1 4.973 9.813l54.103-27.42z"/><path fill="#ce3d1a" d="m69.531 91.654 8.162 8.193 29.269-57.139a18.23 18.23 0 0 1-9.787-5.021zm-7.19 14.036L48.34 133.025a18.23 18.23 0 0 1 9.786 5.022l12.378-24.164z"/><path fill="#d0188f" d="M39.89 80.676a18.23 18.23 0 0 1-10.865 1.72l8.176 52.298a18.23 18.23 0 0 1 10.865-1.72z"/><path fill="#5b36e9" d="M63.326 148.31a18.23 18.23 0 0 1-1.732 10.864l52.289 8.39a18.23 18.23 0 0 1 1.732-10.862z"/><path fill="#30b873" d="M134.915 146.918a18.23 18.23 0 0 1 9.788 5.023l24.134-47.117a18.23 18.23 0 0 1-9.787-5.023z"/><path fill="#ebe305" d="M126.133 33.16a18.23 18.23 0 0 1-7.798 7.761l37.377 37.52a18.23 18.23 0 0 1 7.797-7.76z"/><path fill="#f47601" d="M44.77 51.628a18.23 18.23 0 0 1 4.973 9.812L96.99 37.495a18.23 18.23 0 0 1-4.971-9.811z"/><path fill="#57c115" d="M118.25 40.965a18.23 18.23 0 0 1-10.852 1.812l4.185 26.8 11.42 1.832zm-4.234 44.192 9.895 63.363a18.23 18.23 0 0 1 10.88-1.627l-9.355-59.904z"/><path fill="#dbb210" d="M49.776 61.641a18.23 18.23 0 0 1-1.694 10.869l26.82 4.307 5.272-10.294zm45.968 7.382L90.472 79.32l63.371 10.177a18.23 18.23 0 0 1 1.76-10.859z"/><path fill="#ffca00" d="M93.439 23.842a1 1 0 1 0 33.092 1.802 1 1 0 1 0-33.092-1.802"/><path fill="#64ff00" d="M155.314 85.957a1 1 0 1 0 33.092 1.803 1 1 0 1 0-33.092-1.803"/><path fill="#00a3ff" d="M115.347 163.982a1 1 0 1 0 33.092 1.803 1 1 0 1 0-33.092-1.803"/><path fill="#9500ff" d="M28.77 150.09a1 1 0 1 0 33.092 1.802 1 1 0 1 0-33.092-1.802"/><path fill="red" d="M15.23 63.478a1 1 0 1 0 33.092 1.803 1 1 0 1 0-33.092-1.803"/></svg></span></span>
			<span class='opacity-75 hover:opacity-100 duration-300 ease-in-out'>联邦宇宙</span>
			<span class="ml-1">详情</span>
		</div>
	</div>
</div>
	<div id="mastodon-comments" class="mt-8"></div>
	<style>
    /* Mastodon 评论内容样式 */
    .mastodon-content a {
        color: #3b82f6;
        text-decoration: none;
    }
    .mastodon-content a:hover {
        text-decoration: underline;
    }
    .dark .mastodon-content a {
        color: #60a5fa;
    }
    .mastodon-content p {
        margin: 0;
        line-height: 1.6;
    }
    .mastodon-content .h-card {
        display: inline;
    }
    .mastodon-content .mention {
        color: #3b82f6;
        font-weight: 500;
    }
    .dark .mastodon-content .mention {
        color: #60a5fa;
    }
    /* Redacted Text Effect */
    .sensitive-content.redacted,
    .sensitive-content.redacted * {
        color: transparent !important;
        background-color: black !important;
        border-radius: 2px;
        user-select: none;
    }
    .dark .sensitive-content.redacted,
    .dark .sensitive-content.redacted * {
        background-color: black !important;
    }
	</style>
</div>

<script>
	(function() {
		// 状态管理
		let isMastodonLoaded = false;
		let isLoading = false;

		const btnMastodon = document.getElementById('load-mastodon-statuses');
		const containerMastodon = document.getElementById('mastodon-comments');

		// 辅助函数
		function setVisible(element, visible) {
			if (visible) {
				element.classList.remove('hidden');
				element.style.display = '';
			} else {
				element.classList.add('hidden');
				element.style.display = 'none';
			}
		}

		function setButtonText(btn, text) {
			const span = btn.querySelector('span');
			if (span) span.innerText = text;
		}

		// 初始化：隐藏评论容器
		setVisible(containerMastodon, false);

		async function loadMastodonComments() {
			const slug = '{{ .Params.slug | default .File.TranslationBaseName }}';

			try {
				containerMastodon.innerHTML = '<div class="text-center py-4">加载中...</div>';

				const gtsResponse = await fetch(`https://api.eallion.com/gts/${slug}`);

				if (!gtsResponse.ok) {
					throw new Error(`无法获取 Mastodon 状态 (HTTP ${gtsResponse.status})`);
				}

				const finalUrl = gtsResponse.url;
				const match = finalUrl.match(/\/statuses\/([A-Z0-9]+)/i);
				let statusId = match ? match[1] : null;

				if (!statusId) {
					const html = await gtsResponse.text();
					const metaMatch = html.match(/<meta\s+property="og:url"\s+content="[^"]*\/statuses\/([A-Z0-9]+)"/i);
					statusId = metaMatch ? metaMatch[1] : null;
				}

				if (!statusId) {
					containerMastodon.innerHTML = '<div class="text-center py-4 text-gray-500">该文章暂无 Mastodon 讨论</div>';
					return;
				}

				const contextResponse = await fetch(`https://m.eallion.com/api/v1/statuses/${statusId}/context`, {
					headers: {
						'Authorization': 'Bearer ODRMYZAYZTATMTFHYS0ZZMIWLTHJYMMTYJBMZWY2NZKZZWJH'
					}
				});

				if (!contextResponse.ok) {
					throw new Error(`无法获取评论详情 (HTTP ${contextResponse.status})`);
				}

				let reblogsCount = 0;
				let favouritesCount = 0;
				let repliesCount = 0;

				try {
					const statusResponse = await fetch(`https://m.eallion.com/api/v1/statuses/${statusId}`, {
						headers: {
							'Authorization': 'Bearer ODRMYZAYZTATMTFHYS0ZZMIWLTHJYMMTYJBMZWY2NZKZZWJH'
						}
					});
					if (statusResponse.ok) {
						const statusData = await statusResponse.json();
						reblogsCount = statusData.reblogs_count || 0;
						favouritesCount = statusData.favourites_count || 0;
						repliesCount = statusData.replies_count || 0;
					}
				} catch (e) {
					console.warn('获取 Status 统计数据失败', e);
				}

				const context = await contextResponse.json();
				let comments = context.descendants || [];
				comments = comments.filter(c => c.visibility === 'public');

				const commentMap = new Map();
				const rootComments = [];

				comments.forEach(comment => {
					commentMap.set(comment.id, { ...comment, replies: [] });
				});

				comments.forEach(comment => {
					const commentNode = commentMap.get(comment.id);
					if (comment.in_reply_to_id && commentMap.has(comment.in_reply_to_id)) {
						const parent = commentMap.get(comment.in_reply_to_id);
						parent.replies.push(commentNode);
					} else {
						rootComments.push(commentNode);
					}
				});

				function renderComment(comment, level = 0) {
					const avatar = comment.account.avatar || '';
					const displayName = comment.account.display_name || comment.account.username;
					const username = comment.account.acct;
					const content = comment.content;
					const createdAt = new Date(comment.created_at);
					const url = comment.url;

					function getRelativeTime(date) {
						const now = new Date();
						const diff = Math.floor((now - date) / 1000);
						if (diff < 60) return '刚刚';
						if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
						if (diff < 86400) return `${Math.floor(diff / 3600)} 小时前`;
						if (diff < 604800) return `${Math.floor(diff / 86400)} 天前`;
						return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
					}

					const relativeTime = getRelativeTime(createdAt);
					const isRoot = level === 0;
					const hasReplies = comment.replies && comment.replies.length > 0;
					const commentClass = (isRoot && hasReplies)
						? 'mastodon-comment border-b border-gray-200 dark:border-border-dimmed-subtle pb-4 mb-4'
						: 'mastodon-comment py-2 relative';
					const textSize = isRoot ? 'text-base' : 'text-sm';
					const avatarSize = isRoot ? 'w-10 h-10' : 'w-8 h-8';
					const visualLevel = level > 0 ? 1 : 0;
					const paddingLeft = visualLevel > 0 ? 'style="padding-left: 2rem;"' : '';
					const replyLine = !isRoot
						? `<div class="absolute w-[1px] bg-gray-200 dark:bg-zinc-700 z-10" style="left: 3rem; top: -1rem; bottom: 0; transform: translateX(-50%);"></div>`
						: '';

					let html = `
					<div class="${commentClass}" ${paddingLeft}>
					${replyLine}
					<div class="flex items-start gap-3 relative z-10">
					<a href="${comment.account.url}" target="_blank" rel="noopener" class="flex-shrink-0">
					<img src="${avatar}" alt="${displayName}" class="${avatarSize} rounded-full hover:opacity-80 transition-opacity z-20">
					</a>
					<div class="flex-1 min-w-0">
					<div class="flex items-baseline gap-2 flex-wrap mb-2">
					<a href="${comment.account.url}" target="_blank" rel="noopener" class="font-semibold text-gray-900 dark:text-gray-100 hover:underline">${displayName}</a>
					<span class="text-sm text-gray-500 dark:text-gray-400">@${username}</span>
					<a href="${url}" target="_blank" rel="noopener" class="text-xs text-gray-400 dark:text-gray-500 hover:text-blue-500 dark:hover:text-blue-400">${relativeTime}</a>
					</div>
					${(() => {
					if (comment.sensitive) {
						const spoiler = comment.spoiler_text ? `<span class="text-xs text-wrap wrap-break-word border border-gray-400 dark:border-gray-500 px-1 py-1 rounded my-4 inline-block">CW: ${comment.spoiler_text}</span>` : '';
						const eyeCloseIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="m9.343 18.782-1.932-.518.787-2.939a11 11 0 0 1-3.237-1.872l-2.153 2.154l-1.414-1.414l2.153-2.154a10.96 10.96 0 0 1-2.371-5.07l1.968-.359a9.002 9.002 0 0 0 17.713 0l1.968.358a10.96 10.96 0 0 1-2.372 5.071l2.154 2.154l-1.414 1.414l-2.154-2.154a11 11 0 0 1-3.237 1.872l.788 2.94l-1.932.517l-.788-2.94a11 11 0 0 1-3.74 0z"/></svg>`;
						const eyeOpenIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3c5.392 0 9.878 3.88 10.819 9c-.94 5.12-5.427 9-10.819 9s-9.878-3.88-10.818-9C2.122 6.88 6.608 3 12 3m0 16a9.005 9.005 0 0 0 8.778-7a9.005 9.005 0 0 0-17.555 0A9.005 9.005 0 0 0 12 19m0-2.5a4.5 4.5 0 1 1 0-9a4.5 4.5 0 0 1 0 9m0-2a2.5 2.5 0 1 0 0-5a2.5 2.5 0 0 0 0 5"/></svg>`;

						return `
						<div class="mastodon-content">
						${spoiler}
						<div>
						<button type="button" class="flex items-center rounded-full gap-1.5 px-3 py-1.5 border border-dashed border-gray-400 dark:border-gray-500 hover:bg-gray-100 dark:hover:bg-zinc-800 text-sm font-medium transition-colors text-gray-700 dark:text-gray-200 mb-2 cursor-pointer"
						onclick="const content = this.parentElement.nextElementSibling; content.classList.toggle('redacted'); const isHidden = content.classList.contains('redacted'); this.querySelector('span:last-child').innerText = isHidden ? '显示内容' : '隐藏内容'; this.querySelector('.icon').innerHTML = isHidden ? '${eyeCloseIcon.replace(/"/g, "&quot;")}' : '${eyeOpenIcon.replace(/"/g, "&quot;")}';">
						<span class="icon" style="width: 1em; height: 1em;">${eyeCloseIcon}</span>
						<span>显示内容</span>
						</button>
						</div>
						<div class="sensitive-content redacted transition-colors duration-300 ${textSize} leading-relaxed break-words text-gray-800 dark:text-gray-200">
						${content}
						</div>
						</div>
						`;
					} else {
						return `<div class="text-gray-800 dark:text-gray-200 ${textSize} leading-relaxed break-words mastodon-content">${content}</div>`;
					}
					})()}
					</div>
					</div>
					</div>
					`;

					if (comment.replies && comment.replies.length > 0) {
						comment.replies.forEach(reply => {
							html += renderComment(reply, level + 1);
						});
					}

					return html;
				}

				const totalComments = rootComments.length;
				const totalReplies = comments.length - totalComments;
				let sortOrder = 'asc';

				const iComment = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
				const iHeart = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 32 32"><path fill="#f8312f" d="M21.008 5.162c-2.84.509-5.011 3.905-5.011 3.905s-2.18-3.396-5.012-3.905c-7.012-1.25-9.903 4.993-8.732 9.64c1.73 6.863 10.053 13.014 12.834 14.916c.55.376 1.27.376 1.83 0c2.791-1.902 11.113-8.053 12.834-14.916c1.16-4.647-1.73-10.89-8.743-9.64"/></svg>`;
				const iBoost = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>`;

				let html = `
				<blockquote class="border-l-4 border-gray-300 dark:border-border-dimmed-primary pl-4 py-2 my-4 text-sm italic text-gray-500 dark:text-text-dimmed-secondary leading-relaxed">
				<span class="inline-block">来自 <span class="relative inline-block icon -mr-1 -mb-0.5"><svg viewBox="0 0 75 79" width="1em" height="1em"><path d="M73.84 17.49C72.696 9.002 65.3 2.312 56.53 1.016 55.05.797 49.444.0 36.458.0h-.097c-12.99.0-15.776.797-17.256 1.016-8.525 1.26-16.311 7.271-18.2 15.86-.909 4.23-1.006 8.919-.837 13.22.24 6.17.288 12.327.848 18.47a87 87 0 002.022 12.115c1.795 7.361 9.064 13.487 16.185 15.986a43.4 43.4.0 0023.68 1.25 35 35 0 002.562-.701c1.91-.607 4.147-1.285 5.792-2.477a.19.19.0 00.076-.144v-5.953a.175.175.0 00-.216-.17A65.6 65.6.0 0135.65 70.268c-8.906.0-11.301-4.226-11.987-5.985a18.6 18.6.0 01-1.042-4.718.17.17.0 01.136-.178.2.2.0 01.08.002 64.4 64.4.0 0015.115 1.795c1.225.0 2.446.0 3.67-.032 5.121-.144 10.52-.406 15.558-1.39.125-.025.251-.047.359-.079 7.947-1.526 15.51-6.316 16.279-18.445.029-.477.1-5.002.1-5.497.004-1.684.543-11.946-.079-18.251" fill="url(#a)"></path><path d="M61.248 27.026v21.088h-8.356V27.648c0-4.31-1.796-6.507-5.448-6.507-4.015.0-6.026 2.6-6.026 7.735v11.202H33.11V28.875c0-5.134-2.014-7.734-6.03-7.734-3.63.0-5.444 2.198-5.444 6.507v20.466h-8.353V27.026q0-6.462 3.3-10.269c2.27-2.531 5.247-3.831 8.942-3.831 4.278.0 7.51 1.644 9.665 4.93l2.079 3.49 2.083-3.49c2.154-3.286 5.386-4.93 9.657-4.93 3.691.0 6.668 1.3 8.945 3.831q3.297 3.802 3.293 10.27" fill="#fff"></path><defs><linearGradient id="a" x1="37.069" y1="0" x2="37.069" y2="79" gradientUnits="userSpaceOnUse"><stop stop-color="#6364FF"></stop><stop offset="1" stop-color="#563ACC"></stop></linearGradient></defs></svg></span> <a href="https://m.eallion.com/@eallion/statuses/${statusId}" target="_blank" rel="noreferrer noopener nofollow" class="no-underline hover:text-[#0969da] dark:hover:text-[#539bf5]">@eallion@eallion.com</a> 的<b>公开</b>讨论。</span><span class="inline-block">去互动： <a href="https://m.eallion.com/@eallion/statuses/${statusId}" target="_blank" rel="noreferrer noopener nofollow" class="underline hover:text-[#0969da] dark:hover:text-[#539bf5]">${statusId}</a></span>
				</blockquote>
				<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-2 text-sm font-semibold text-gray-700 dark:text-text-dimmed-primary">
				<div class="flex flex-wrap items-center gap-x-2 gap-y-1">
				<span class="inline-flex items-center gap-1 text-base"><span class="text-blue-500 dark:text-blue-400">${iComment}</span><a href="https://m.eallion.com/@eallion/statuses/${statusId}" target="_blank" rel="noreferrer noopener nofollow" class="no-underline">${totalComments} 条评论</a></span>
				<span>·</span>
				<span class="text-base font-normal"><a href="https://m.eallion.com/@eallion/statuses/${statusId}" target="_blank" rel="noreferrer noopener nofollow" class="no-underline">(${totalReplies} 条回复)</a></span>
				${favouritesCount > 0 ? `<span>·</span><span class="inline-flex items-center gap-1 text-base font-normal"><span class="text-pink-600 dark:text-pink-400">${iHeart}</span><a href="https://m.eallion.com/@eallion/statuses/${statusId}" target="_blank" rel="noreferrer noopener nofollow" class="no-underline">${favouritesCount}</a></span>` : ''}
				${reblogsCount > 0 ? `<span>·</span><span class="inline-flex items-center gap-1 text-base font-normal"><span class="text-blue-600 dark:text-blue-400">${iBoost}</span><a href="https://m.eallion.com/@eallion/statuses/${statusId}" target="_blank" rel="noreferrer noopener nofollow" class="no-underline">${reblogsCount}</a></span>` : ''}
				</div>
				<div class="flex items-center bg-transparent gap-1">
				<button type="button" id="sort-earliest" class="px-3 py-1 text-sm hover:bg-gh-bg-primary dark:hover:bg-bg-dimmed-secondary transition-colors text-gh-text-primary dark:text-text-dimmed-primary font-bold bg-gh-bg-primary dark:bg-bg-dimmed-secondary border border-gh-border-primary dark:border-border-dimmed-primary rounded-md cursor-pointer">最早</button>
				<button type="button" id="sort-latest" class="px-3 py-1 text-sm hover:bg-gh-bg-primary dark:hover:bg-bg-dimmed-secondary transition-colors text-gray-500 dark:text-text-dimmed-secondary rounded-md cursor-pointer">最新</button>
				</div>
				</div>
				<div class="mastodon-comments-container mt-2 rounded-lg">
				<div class="mastodon-comments-list"></div>
				</div>
				`;

				containerMastodon.innerHTML = html;

				function renderList() {
					if (rootComments.length === 0) {
						containerMastodon.querySelector('.mastodon-comments-list').innerHTML = '<div class="text-center py-4 text-gray-500">暂无评论</div>';
						return;
					}

					rootComments.sort((a, b) => {
						const dateA = new Date(a.created_at);
						const dateB = new Date(b.created_at);
						return sortOrder === 'asc' ? dateA - dateB : dateB - dateA;
					});

					let listHtml = '';
					rootComments.forEach(comment => {
						listHtml += `<div class="mastodon-comment-group border-b border-gray-200 dark:border-border-dimmed-subtle last:border-b-0 mb-4 px-4 py-4 rounded-lg last:mb-0 bg-zinc-50 dark:bg-bg-dimmed-primary">`;
						listHtml += renderComment(comment);
						listHtml += `</div>`;
					});
					containerMastodon.querySelector('.mastodon-comments-list').innerHTML = listHtml;
				}

				const btnEarliest = containerMastodon.querySelector('#sort-earliest');
				const btnLatest = containerMastodon.querySelector('#sort-latest');

				function updateButtons() {
					const activeClasses = ['text-gh-text-primary', 'dark:text-text-dimmed-primary', 'font-bold', 'bg-gh-bg-primary', 'dark:bg-bg-dimmed-secondary', 'border', 'border-gh-border-primary', 'dark:border-border-dimmed-primary'];
					const inactiveClasses = ['text-gray-500', 'dark:text-text-dimmed-secondary', 'bg-transparent', 'border-transparent'];

					if (sortOrder === 'asc') {
						btnEarliest.classList.add(...activeClasses);
						btnEarliest.classList.remove(...inactiveClasses);
						btnLatest.classList.remove(...activeClasses);
						btnLatest.classList.add(...inactiveClasses);
					} else {
						btnLatest.classList.add(...activeClasses);
						btnLatest.classList.remove(...inactiveClasses);
						btnEarliest.classList.remove(...activeClasses);
						btnEarliest.classList.add(...inactiveClasses);
					}
				}

				btnEarliest.addEventListener('click', () => {
					if (sortOrder !== 'asc') {
						sortOrder = 'asc';
						updateButtons();
						renderList();
					}
				});

				btnLatest.addEventListener('click', () => {
					if (sortOrder !== 'desc') {
						sortOrder = 'desc';
						updateButtons();
						renderList();
					}
				});

				updateButtons();
				renderList();

			} catch (error) {
				console.error('加载 Mastodon 评论失败:', error);
				containerMastodon.innerHTML = `<div class="text-center py-4 text-red-500">加载失败：${error.message}</div>`;
			}
		}

		btnMastodon.addEventListener('click', async () => {
			if (isLoading) return;

			const isVisible = !containerMastodon.classList.contains('hidden') && containerMastodon.style.display !== 'none';

			if (isVisible) {
				setVisible(containerMastodon, false);
				setButtonText(btnMastodon, '加载');
				return;
			}

			isLoading = true;
			btnMastodon.style.pointerEvents = 'none';
			btnMastodon.style.opacity = '0.5';

			try {
				if (!isMastodonLoaded) {
					await loadMastodonComments();
					isMastodonLoaded = true;
				}
				setVisible(containerMastodon, true);
				setButtonText(btnMastodon, '隐藏');
			} catch (e) {
				console.error(e);
			} finally {
				isLoading = false;
				btnMastodon.style.pointerEvents = '';
				btnMastodon.style.opacity = '';
			}
		});
	})();
</script>
