<hr class="border-t border-gray-200 dark:border-border-dimmed-subtle my-8 md:my-14">

<div id="aigcs" class="mb-12">评 论</div>
{{- with resources.Get "js/aigcs.js" -}}
	{{- if eq hugo.Environment "development" -}}
		<script src="{{ .RelPermalink }}"></script>
	{{- else -}}
		{{- with . | fingerprint -}}
			<script src="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}" crossorigin="anonymous"></script>
		{{- end -}}
	{{- end -}}
{{- end -}}
<script>
  AIGCS.init({
    el: '#aigcs',
    site: 'www.eallion.com',
    path: '{{ .RelPermalink }}',
    server: 'https://aigcs.eallion.com',
    lang: 'zh-hans',
    theme: 'auto',
    lightTheme: 'light',
    darkTheme: 'dimmed',
    autoGenerate: false,
    disableCopyright: false,
  })
</script>
