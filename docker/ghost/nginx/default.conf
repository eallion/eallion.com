upstream ghost_backend {
    server ghost:2368;
    keepalive 32;
}

server {
    listen 58080;
    server_name ghost.eallion.com;

    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host $host;

    # ActivityPub → ap.ghost.org 托管网关
    location ~* ^/(?:\.well-known/(?:webfinger|nodeinfo|host-meta)|\.ghost/activitypub) {
        set $ap_gateway "https://ap.ghost.org";
        proxy_pass $ap_gateway;
        proxy_ssl_server_name on;
        proxy_set_header Host $http_host;
        proxy_set_header Authorization $http_authorization;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
    }

    # Static assets with long cache
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|css|js|woff2?)$ {
        proxy_pass http://ghost_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Everything else → Ghost
    location / {
        proxy_pass http://ghost_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
